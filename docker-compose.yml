version: '3.8'

services:
  # FastAPI Application
  web:
    build: .
    container_name: bh-enterprises-app
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://bhuser:bhpassword@db:5432/bh_enterprises
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./static:/app/static
    networks:
      - bh-network
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: bh-enterprises-db
    environment:
      - POSTGRES_USER=bhuser
      - POSTGRES_PASSWORD=bhpassword
      - POSTGRES_DB=bh_enterprises
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bh-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bhuser"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: bh-enterprises-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
    depends_on:
      - web
    networks:
      - bh-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  bh-network:
    driver: bridge
